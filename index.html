<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The American Dream — Immigration Decision Simulation</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#0c0e14;--card:#13161f;--card2:#191d27;--border:#252b38;
  --amber:#e8a020;--amber-glow:rgba(232,160,32,0.12);
  --green:#2ea84b;--red:#e53935;--blue:#4a9eff;
  --text:#ddd8cc;--text-dim:#8e8880;--text-muted:#464040;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Crimson Text',Georgia,serif;}
#app{min-height:100vh;background-image:radial-gradient(ellipse at 15% 15%,rgba(232,160,32,0.05) 0%,transparent 50%),radial-gradient(ellipse at 85% 85%,rgba(74,158,255,0.04) 0%,transparent 50%);}

/* ======= INTRO ======= */
#intro{max-width:940px;margin:0 auto;padding:48px 20px 60px;}
.intro-masthead{text-align:center;margin-bottom:44px;}
.intro-flags{font-size:36px;letter-spacing:10px;margin-bottom:18px;filter:grayscale(20%);}
.intro-masthead h1{font-family:'Playfair Display',serif;font-size:clamp(26px,5.5vw,50px);font-weight:900;color:var(--amber);line-height:1.1;margin-bottom:6px;}
.intro-masthead h2{font-family:'Playfair Display',serif;font-style:italic;font-size:clamp(14px,2.5vw,20px);color:var(--text-dim);margin-bottom:24px;}
.intro-rule{width:60px;height:2px;background:var(--amber);margin:0 auto 24px;}
.intro-lede{max-width:620px;margin:0 auto;font-size:17px;line-height:1.8;color:var(--text);border-left:3px solid var(--amber);padding-left:18px;text-align:left;}
.intro-lede p{margin-bottom:10px;}
.intro-lede p:last-child{margin-bottom:0;}
.char-select-label{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:4px;color:var(--text-muted);text-transform:uppercase;text-align:center;margin:40px 0 20px;}
.char-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px;margin-bottom:36px;}
.char-card{background:var(--card);border:1px solid var(--border);border-radius:3px;padding:24px;cursor:pointer;transition:all .25s;position:relative;overflow:hidden;}
.char-card:before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--cc,var(--amber));transform:scaleX(0);transition:transform .3s;transform-origin:left;}
.char-card:hover{border-color:var(--cc,var(--amber));transform:translateY(-3px);box-shadow:0 10px 30px rgba(0,0,0,.5);}
.char-card:hover:before{transform:scaleX(1);}
.cc-flag{font-size:34px;margin-bottom:10px;}
.cc-name{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:var(--cc,var(--text));margin-bottom:3px;}
.cc-meta{font-family:'Space Mono',monospace;font-size:9px;color:var(--text-muted);letter-spacing:1px;margin-bottom:11px;}
.cc-bg{font-size:14px;line-height:1.65;color:var(--text-dim);font-style:italic;margin-bottom:14px;}
.cc-savings{display:flex;align-items:center;gap:8px;font-family:'Space Mono',monospace;font-size:11px;color:var(--text-dim);}
.savings-track{flex:1;height:3px;background:var(--border);border-radius:2px;}
.savings-fill{height:100%;background:var(--cc,var(--amber));border-radius:2px;}
.intro-disclaimer{text-align:center;font-size:13px;color:var(--text-muted);font-style:italic;max-width:580px;margin:0 auto;}

/* ======= GAME ======= */
#game{max-width:820px;margin:0 auto;padding:20px;display:none;}
.game-topbar{display:flex;align-items:center;gap:14px;margin-bottom:22px;padding-bottom:16px;border-bottom:1px solid var(--border);flex-wrap:wrap;}
.char-badge{display:flex;align-items:center;gap:10px;}
.cb-flag{font-size:26px;}
.cb-name{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;}
.cb-country{font-family:'Space Mono',monospace;font-size:9px;color:var(--text-muted);}
.stats-bar{display:flex;gap:10px;flex-wrap:wrap;margin-left:auto;}
.stat-pill{background:var(--card);border:1px solid var(--border);border-radius:3px;padding:6px 12px;text-align:center;min-width:75px;}
.sp-label{font-family:'Space Mono',monospace;font-size:8px;letter-spacing:1px;color:var(--text-muted);text-transform:uppercase;}
.sp-val{font-family:'Space Mono',monospace;font-size:13px;font-weight:700;margin-top:2px;}
.sp-val.m{color:#4caf50;}.sp-val.t{color:var(--blue);}.sp-val.sl{color:var(--green);}.sp-val.su{color:var(--red);}.sp-val.sk{color:var(--amber);}

.scene{background:var(--card);border:1px solid var(--border);border-radius:3px;overflow:hidden;animation:fadeup .35s ease;}
@keyframes fadeup{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.scene-loc{background:var(--card2);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;gap:8px;font-family:'Space Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--text-muted);text-transform:uppercase;}
.loc-dot{width:6px;height:6px;border-radius:50%;background:var(--cc,var(--amber));box-shadow:0 0 7px var(--cc,var(--amber));animation:blink 2s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.5;transform:scale(1.2);}}
.scene-title{margin-left:auto;color:var(--cc,var(--amber));font-size:11px;}

.scene-body{padding:24px 24px 0;}
.scene-body p{font-size:17px;line-height:1.82;margin-bottom:12px;}
.scene-body p:last-child{margin-bottom:0;}
.scene-body em{color:var(--amber);font-style:italic;}
.scene-body strong{color:var(--text);font-weight:600;}

.rc-box{margin:20px 24px 0;background:rgba(232,160,32,.06);border:1px solid rgba(232,160,32,.18);border-radius:3px;padding:16px;}
.rc-head{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--amber);text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.rc-head::before{content:'◆';font-size:8px;}
.rc-facts{list-style:none;display:flex;flex-direction:column;gap:6px;}
.rc-facts li{font-size:13px;color:var(--text-dim);padding-left:14px;position:relative;line-height:1.55;}
.rc-facts li::before{content:'—';position:absolute;left:0;color:var(--text-muted);}

.choices-wrap{padding:18px 24px 24px;border-top:1px solid var(--border);background:var(--card2);margin-top:20px;}
.choices-head{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:3px;color:var(--text-muted);text-transform:uppercase;margin-bottom:12px;}
.choices-list{display:flex;flex-direction:column;gap:9px;}
.choice-btn{background:var(--card);border:1px solid var(--border);border-radius:3px;padding:14px 18px;cursor:pointer;text-align:left;transition:all .22s;display:grid;grid-template-columns:28px 1fr auto;align-items:start;gap:14px;color:var(--text);font-family:'Crimson Text',serif;font-size:16px;line-height:1.55;}
.choice-btn:hover{border-color:var(--cc,var(--amber));background:var(--amber-glow);transform:translateX(4px);}
.choice-letter{font-family:'Space Mono',monospace;font-size:10px;color:var(--cc,var(--amber));border:1px solid var(--cc,var(--amber));border-radius:2px;width:22px;height:22px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;}
.choice-tag{font-family:'Space Mono',monospace;font-size:9px;text-align:right;line-height:1.7;white-space:nowrap;}
.tag-cost{color:#e57373;}.tag-time{color:var(--blue);}

.history-log{background:var(--card);border:1px solid var(--border);border-radius:3px;padding:14px;margin-top:14px;}
.hl-head{font-family:'Space Mono',monospace;font-size:8px;letter-spacing:2px;color:var(--text-muted);text-transform:uppercase;margin-bottom:8px;}
.hl-list{max-height:90px;overflow-y:auto;display:flex;flex-direction:column;gap:3px;}
.hl-item{font-size:13px;color:var(--text-muted);padding-left:14px;position:relative;}
.hl-item::before{content:'→';position:absolute;left:0;color:var(--text-muted);}

.btn-back{background:transparent;color:var(--text-muted);border:1px solid var(--border);padding:7px 14px;font-family:'Space Mono',monospace;font-size:9px;letter-spacing:1px;cursor:pointer;border-radius:2px;margin-bottom:18px;transition:all .2s;}
.btn-back:hover{color:var(--text);border-color:var(--text-dim);}

/* ======= OUTCOME ======= */
#outcome{max-width:680px;margin:0 auto;padding:50px 20px 60px;display:none;text-align:center;}
.oc-emoji{font-size:72px;display:block;margin-bottom:14px;animation:stampin .55s cubic-bezier(.175,.885,.32,1.275);}
@keyframes stampin{from{transform:scale(3.5) rotate(-18deg);opacity:0;}to{transform:scale(1) rotate(0);opacity:1;}}
.oc-badge{display:inline-block;font-family:'Space Mono',monospace;font-size:9px;letter-spacing:3px;text-transform:uppercase;padding:4px 12px;border-radius:2px;margin-bottom:14px;}
.oc-badge.legal{background:rgba(46,168,75,.15);color:var(--green);border:1px solid rgba(46,168,75,.3);}
.oc-badge.undoc{background:rgba(229,57,53,.15);color:var(--red);border:1px solid rgba(229,57,53,.3);}
.oc-badge.limbo{background:rgba(232,160,32,.15);color:var(--amber);border:1px solid rgba(232,160,32,.3);}
.oc-badge.deported{background:rgba(229,57,53,.15);color:var(--red);border:1px solid rgba(229,57,53,.3);}
.oc-badge.left{background:rgba(74,158,255,.15);color:var(--blue);border:1px solid rgba(74,158,255,.3);}
.oc-title{font-family:'Playfair Display',serif;font-size:clamp(22px,4.5vw,38px);font-weight:900;margin-bottom:16px;line-height:1.2;}
.oc-narrative{font-size:17px;line-height:1.82;color:var(--text-dim);max-width:560px;margin:0 auto 24px;text-align:left;}
.oc-stats{display:flex;justify-content:center;gap:12px;flex-wrap:wrap;margin-bottom:28px;}
.oc-stat{background:var(--card);border:1px solid var(--border);border-radius:3px;padding:12px 18px;min-width:95px;}
.oc-stat .lbl{font-family:'Space Mono',monospace;font-size:8px;color:var(--text-muted);letter-spacing:1px;}
.oc-stat .val{font-family:'Space Mono',monospace;font-size:15px;font-weight:700;margin-top:4px;}
.oc-context{background:var(--card);border:1px solid var(--border);border-radius:3px;padding:22px;text-align:left;margin-bottom:26px;}
.oc-context h3{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--amber);text-transform:uppercase;margin-bottom:12px;}
.oc-context p{font-size:15px;line-height:1.75;color:var(--text-dim);margin-bottom:10px;}
.oc-context p:last-child{margin-bottom:0;}
.oc-bigfact{border-top:1px solid var(--border);padding-top:14px;margin-top:6px;color:var(--amber) !important;font-style:italic;}
.btn-replay{background:var(--amber);color:#000;border:none;padding:13px 28px;font-family:'Space Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;border-radius:2px;margin:5px;transition:all .2s;}
.btn-replay:hover{background:#ffc107;transform:translateY(-1px);}
.btn-newchar{background:transparent;color:var(--amber);border:1px solid var(--amber);padding:13px 28px;font-family:'Space Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;border-radius:2px;margin:5px;transition:all .2s;}
.btn-newchar:hover{background:var(--amber-glow);}
.oc-footer{font-size:12px;color:var(--text-muted);font-style:italic;max-width:500px;margin:24px auto 0;line-height:1.7;}
</style>
</head>
<body>
<div id="app">
  <div id="intro"></div>
  <div id="game"></div>
  <div id="outcome"></div>
</div>
<script>
// ============================================================
// DATA
// ============================================================
const CHARS = {
  sofia:{id:'sofia',name:'Sofia Mejía',age:32,country:'Guatemala',flag:'🇬🇹',color:'#e07b39',money:2200,
    bg:'Single mother of two (ages 7 & 9). Her husband was murdered by MS-13 after refusing extortion payments. She now receives death threats. Her sister lives in Houston — but arrived undocumented 8 years ago and cannot legally sponsor Sofia.',
    start:'sofia_start'},
  arjun:{id:'arjun',name:'Arjun Sharma',age:29,country:'India',flag:'🇮🇳',color:'#4a9eff',money:11000,

    start:'arjun_start'},
  fatima:{id:'fatima',name:'Fatima Okonkwo',age:24,country:'Nigeria',flag:'🇳🇬',color:'#a855f7',money:3800,
    bg:'University graduate with an accounting degree from Lagos. Nigeria\'s job market is extremely limited. She has no US employer contact, no immediate US citizen family, and no significant savings beyond $3,800.',

    bg:'Journalist and community organizer who documented anti-government protests in Caracas. Government agents visited his editor\'s office; two colleagues were arrested under anti-dissent laws. He received a direct warning. The US Embassy in Venezuela has been closed since 2019 — no in-country visa processing exists.',

const NODES = {

sofia_start:{

sofia_lawyer:{

    {txt:'Live with your sister. You are undocumented — but your children are safe. You will figure out next steps from here.',cost:'',time:'',md:0,td:0,next:'oc_sofia_undoc_crossed'}
  ]},

sofia_tourist_app:{
  loc:'US Embassy, Guatemala City',title:'Tourist Visa Application',
  body:`<p>You fill out Form DS-160 and schedule a B-2 tourist visa interview. The consular officer asks: Why do you want to visit the US? What ties do you have to Guatemala? When will you return?</p>
  <p>You have no property, no stable formal employment, no significant bank account. You have two young children and a murdered husband. Officers look for strong ties to the home country as proof you will return. You have almost none.</p>`,
  rc:{title:'B-2 Visa Application Realities',facts:[
    'Guatemala B-2 visa refusal rate: approximately 35–45%',
    'Consular officers must believe the applicant will return home — people fleeing violence often cannot credibly prove this',
    'The $185 application fee is non-refundable even if denied',
    '~40–50% of all undocumented immigrants in the US entered legally on tourist visas and overstayed'
  ]},
  choices:[
    {txt:'Visa DENIED — the officer finds insufficient ties to Guatemala. Sofia does not appear to be a true "tourist."',cost:'$185 lost',time:'6 weeks lost',md:0,td:0,next:'sofia_tourist_denied'},
    {txt:'Visa APPROVED (unlikely but possible) — Sofia enters the US legally as a tourist for up to 6 months.',cost:'$185 paid',time:'1 week to enter',md:0,td:1,next:'sofia_tourist_in_us'}
  ]},

sofia_tourist_denied:{
  loc:'Guatemala City, Guatemala',title:'Denied',
  body:`<p>The officer slides your passport back under the glass: <em>"Your visa application has been refused under Section 214(b). You have not demonstrated sufficient ties to Guatemala to ensure your timely return."</em></p>
  <p>You are back to square one — $185 poorer. Reapplying with the same circumstances almost always leads to the same result. The threat at home has not changed.</p>`,
  rc:{title:'After a Visa Denial',facts:[
    'Visa denials are recorded — reapplying with the same profile rarely succeeds',

    'Many people denied tourist visas then turn to unauthorized crossing — the denial itself becomes a push toward undocumented migration',
    'This dynamic illustrates why legal pathways are so limited for many who ultimately end up undocumented'

  choices:[
    {txt:'With legal options shrinking and the threat growing, seriously consider the smuggler option.',cost:'',time:'',md:0,td:0,next:'sofia_coyote_cost'},

  ]},

sofia_tourist_in_us:{
  loc:'Houston, Texas',title:'Six Months in America',
  body:`<p>You enter the US legally. Your B-2 visa allows a 6-month stay. You live with your sister Maria in Houston. Your children enroll in school. You find informal cash work cleaning homes.</p>
  <p>The six months pass faster than you expected. Your visa is about to expire. You cannot simply apply for asylum now — you entered claiming tourist intent, and the 1-year asylum filing deadline is approaching. Your visa expires in 3 days.</p>`,
  rc:{title:'Tourist Visas and Overstays',facts:[
    'Approximately 40–50% of all undocumented immigrants entered the US on valid visas and overstayed',
    'Working on a B-2 tourist visa is a violation of visa terms and grounds for deportation',
    'After 180 days of unlawful presence: leaving triggers a 3-year bar to reentry. After 365 days: a 10-year bar.',
    'The US has no automated exit-tracking system at land borders — overstays are often never detected'
  ]},
  choices:[
    {txt:'Return to Guatemala before the visa expires. Leave legally — but return to the threats.',cost:'',time:'',md:0,td:0,next:'oc_sofia_returned'},
